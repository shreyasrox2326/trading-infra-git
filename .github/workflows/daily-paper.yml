name: Daily Paper Trading

on:
  schedule:
    - cron: "30 13 * * 1-5"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Decision date in YYYY-MM-DD format. Defaults to current UTC date."
        required: false
        type: string
      exchange:
        description: "Exchange partition to load from R2."
        required: false
        default: "NSE"
        type: string

jobs:
  daily-paper:
    runs-on: ubuntu-latest
    env:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      EXCHANGE: ${{ inputs.exchange || 'NSE' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install -e .

      - name: Resolve run date
        id: run-date
        shell: bash
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            echo "value=${{ inputs.run_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run daily paper workflow
        run: >
          python -m trading_infra paper-dry-run
          --date "${{ steps.run-date.outputs.value }}"
          --use-r2
          --exchange "${EXCHANGE}"
          --upload-results
